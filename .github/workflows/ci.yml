name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  merge_group: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - name: Setup
        run: npm i -g @antfu/ni

      - name: Install
        run: nci

      - name: Lint
        run: nr lint

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node_version: [23, lts/*]
        include:
          - os: macos-latest
            node_version: lts/*
          - os: windows-latest
            node_version: lts/*
      fail-fast: false

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: pnpm

      - run: corepack enable

      - name: Setup
        run: npm i -g @antfu/ni

      - name: Install
        run: nci

      - name: Build
        run: nr build

      - name: Test
        run: nr test

      - name: Typecheck
        run: nr typecheck

  playwright-smoke:
    runs-on: ubuntu-22.04
    needs: [lint, test]
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.38.0-jammy

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Diff smoke
        run: pnpm smoke:diff

      - name: Height stability smoke
        run: pnpm smoke:height-stability

  performance-gate:
    runs-on: ubuntu-22.04
    needs: [playwright-smoke]
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.38.0-jammy

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      # PR #9 does not commit scripts/performance-baseline.json, so the default
      # CI gate must use hard budgets only. After generating and committing a
      # same-runner baseline, this can be switched to `pnpm perf:gate:baseline`.
      - name: Performance budget gate
        shell: bash
        run: pnpm perf:gate:budget

      - name: Analyze performance report
        if: always()
        run: pnpm perf:analyze || true

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-monaco-performance-report
          path: .perf/*
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14
